apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-custom-deployment
  labels:
    app: flask

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask

  template:
    metadata:
      labels:
        app: flask

      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "flask-role"

        vault.hashicorp.com/agent-inject-secret-mysql: "kv/myapp/config"

        vault.hashicorp.com/agent-inject-template-mysql: |
          {{- with secret "kv/myapp/config" -}}
          {{ .Data.password }}
          {{- end }}

    spec:
      serviceAccountName: flask-sa

      containers:
      - name: flask
        image: lokisahetia/loki-flask-app:5
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  labels:
    app: flask
spec:
  type: NodePort
  selector:
    app: flask
  ports:
    - protocol: TCP
      port: 5000          # Service port
      targetPort: 5000    # Container port
      nodePort: 30096     # NodePort (Range: 30000-32767) 
